# 管理员配置
admin:
  password: "admin123" # 管理员密码，首次登录后可修改

# 数据库配置
database:
  driver: "mysql"
  host: "rm-uf6w3mxrrl5dgn45lto.rwlb.rds.aliyuncs.com"
  port: 3306
  user: "${DB_USER}"           # 从环境变量 DB_USER 读取
  password: "${DB_PASSWORD}"   # 从环境变量 DB_PASSWORD 读取，勿硬编码
  name: "coding_plan_share"
  pool_size: 20
  max_overflow: 40
  pool_recycle: 1800

# 限流配置
rate_limit:
  user_rpm: 60 # 单个用户每分钟最大请求数
  default_provider_rpm: 30 # 厂商密钥默认每分钟最大请求数

# 加密配置
security:
  encryption_key: "${ENCRYPTION_KEY}"   # 从环境变量读取，勿硬编码
  jwt_secret: "${JWT_SECRET}"           # 从环境变量读取，勿硬编码

# 超时配置
timeout:
  request_timeout: 5 # 请求超时时间，单位：秒

# 密钥管理配置
key_management:
  max_retry: 1 # 密钥失败后最大重试次数
  cool_down_period: 7200 # 密钥超限时的冷却时间，单位：秒，暂时没有实现
  max_concurrency: 1 # 每个密钥的最大并发数，暂时没有实现



# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"